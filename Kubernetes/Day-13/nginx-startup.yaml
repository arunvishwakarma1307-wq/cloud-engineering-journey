apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-startup-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-startup
  template:
    metadata:
      labels:
        app: nginx-startup
    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80

        startupProbe:
          httpGet:
            path: /
            port: 80
          failureThreshold: 30
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5

        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
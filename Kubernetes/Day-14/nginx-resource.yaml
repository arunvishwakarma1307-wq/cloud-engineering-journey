apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-resource-demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: nginx-resource

  template:
    metadata:
      labels:
        app: nginx-resource

    spec:
      containers:
      - name: nginx
        image: nginx

        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"

          limits:
            memory: "128Mi"
            cpu: "500m"